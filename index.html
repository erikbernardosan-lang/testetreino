<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Vôlei Fit - Athletic 2001</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#f97316', 
            darkBg: '#111827', 
            darkCard: '#1f2937' 
          }
        }
      }
    }
  </script>
</head>
<body class="bg-black flex justify-center text-white antialiased">

  <main class="w-full max-w-md h-screen bg-darkBg relative overflow-hidden shadow-2xl flex flex-col">
    
    <section id="tela-hoje" class="flex flex-col h-full overflow-y-auto pb-28">
      <div class="flex bg-gray-900 p-2 gap-2 border-b border-gray-800">
        <button onclick="mudarTreino('A')" id="btn-treino-A" class="flex-1 py-2 font-bold rounded-lg transition bg-primary text-white">
          Treino A (Inferiores)
        </button>
        <button onclick="mudarTreino('B')" id="btn-treino-B" class="flex-1 py-2 font-bold rounded-lg transition bg-gray-800 text-gray-400">
          Treino B (Superiores)
        </button>
      </div>

      <header class="p-6 bg-darkCard rounded-b-2xl shadow-md border-b border-gray-800">
        <p class="text-gray-400 text-sm font-semibold uppercase tracking-wider">Performance Voleibol</p>
        <h1 id="header-titulo" class="text-2xl font-bold mt-1 text-primary">Treino A: Membros Inferiores & Core</h1>
        <p id="header-sub" class="text-sm text-gray-300 mt-2"><i class="fa-regular fa-clock mr-1"></i> Foco em Salto Vertical e Estabilidade</p>
      </header>

      <div id="lista-exercicios" class="p-6 flex-1 flex flex-col gap-4"></div>

      <div class="fixed bottom-0 w-full max-w-md p-6 bg-gradient-to-t from-darkBg via-darkBg to-transparent">
        <button onclick="iniciarFluxoTreino()" class="w-full bg-primary hover:bg-orange-600 text-white font-bold py-4 rounded-xl shadow-lg shadow-orange-500/30 transition-all text-lg">
          Iniciar Treino
        </button>
      </div>
    </section>

    <section id="tela-treino" class="hidden flex-col h-full">
      
      <header class="p-6 flex items-center justify-between border-b border-gray-800">
        <button onclick="voltarParaHoje()" class="text-gray-400 hover:text-white">
          <i class="fa-solid fa-xmark text-xl"></i>
        </button>
        <div class="text-center">
          <p id="treino-etapa" class="text-xs text-gray-400 uppercase tracking-widest">Etapa 1/6</p>
          <h2 id="treino-nome-exercicio" class="font-bold text-lg text-gray-100">Nome do Exercício</h2>
        </div>
        <button onclick="proximoExercicio()" class="text-primary hover:text-orange-400 font-semibold text-sm">Pular</button>
      </header>

      <div class="flex-1 flex flex-col items-center justify-center p-6">
        
        <p id="timer-estado" class="text-xs font-bold uppercase tracking-widest text-primary mb-2">Exercício</p>

        <div class="w-52 h-52 bg-darkCard rounded-full flex flex-col items-center justify-center border-4 border-primary mb-4 relative shadow-inner">
           <span id="timer-display" class="text-5xl font-black tracking-tight text-white">00:00</span>
           <span id="treino-meta" class="text-sm font-semibold text-gray-400 mt-1">4 x 12</span>
        </div>

        <p id="treino-objetivo" class="text-gray-400 font-medium text-xs uppercase tracking-wider mb-2">Objetivo</p>
        <p id="treino-dica" class="text-gray-300 text-center text-sm px-4 max-h-20 overflow-y-auto">Dica operacional aqui.</p>
        
        <div class="mt-6 flex items-center gap-6">
          <button onclick="exercicioAnterior()" class="w-12 h-12 bg-gray-800 rounded-full flex items-center justify-center text-gray-300 hover:bg-gray-700">
            <i class="fa-solid fa-backward-step"></i>
          </button>
          <button onclick="alternarPlayPause()" id="btn-play-pause" class="w-16 h-16 bg-primary hover:bg-orange-600 rounded-full flex items-center justify-center text-2xl shadow-lg shadow-orange-500/40">
            <i id="icone-play-pause" class="fa-solid fa-pause"></i>
          </button>
          <button onclick="proximoExercicio()" class="w-12 h-12 bg-gray-800 rounded-full flex items-center justify-center text-gray-300 hover:bg-gray-700">
            <i class="fa-solid fa-forward-step"></i>
          </button>
        </div>
      </div>

      <div class="p-6 bg-darkCard rounded-t-2xl border-t border-gray-800">
        <div class="flex gap-4 mb-4">
          <div class="flex-1 bg-gray-800 rounded-lg p-2 flex items-center justify-between border border-gray-700">
            <span class="text-xs text-gray-400 ml-2">Carga (kg)</span>
            <input type="number" placeholder="0" class="bg-transparent w-16 text-right font-bold text-base outline-none text-white mr-2">
          </div>
          <div class="flex-1 bg-gray-800 rounded-lg p-2 flex items-center justify-between border border-gray-700">
            <span class="text-xs text-gray-400 ml-2">RPE (1-10)</span>
            <input type="number" placeholder="8" max="10" class="bg-transparent w-12 text-right font-bold text-base outline-none text-white mr-2">
          </div>
        </div>
        <button onclick="concluirSerie()" id="btn-acao-principal" class="w-full bg-white text-black font-bold py-4 rounded-xl hover:bg-gray-200 transition-all text-lg shadow-md">
          Concluir Série
        </button>
      </div>
    </section>

  </main>

  <script>
    const rotinas = {
      A: {
        titulo: "Treino A: Inferiores & Core",
        subtitulo: "Foco em Salto Vertical e Estabilidade",
        exercicios: [
          { nome: "Bicicleta Ergométrica", tipo: "tempo", tempo: 600, descanso: 0, obj: "Aquecimento", dica: "Velocidade constante para lubrificar as articulações dos joelhos.", meta: "10 min" },
          { nome: "Agachamento (Meio Cursor)", tipo: "reps", tempo: 0, descanso: 60, obj: "Potência de Salto", dica: "Polia baixa com barra pequena. Faça a subida de forma explosiva!", meta: "4 x 12" },
          { nome: "Extensão das Pernas", tipo: "reps", tempo: 0, descanso: 45, obj: "Proteção de Joelho", dica: "Cadeira extensora. Essencial para desaceleração e amortecimento de quedas.", meta: "3 x 12-15" },
          { nome: "Flexão de Pernas", tipo: "reps", tempo: 0, descanso: 45, obj: "Prevenção de Lesão", dica: "Em pé no rolete. Fortalece os isquiotibiais e equilibra a articulação.", meta: "3 x 12 (Cada)" },
          { nome: "Bi-set: Abdutor + Adutor", tipo: "reps", tempo: 0, descanso: 60, obj: "Deslocamento Lateral", dica: "Caneleira na polia baixa. Execute uma série de adutor e mude direto para abdutor.", meta: "3 x 15 (Cada)" },
          { nome: "Combo: Contração + Infra", tipo: "reps", tempo: 0, descanso: 45, obj: "Estabilidade do Core", dica: "Conjugado sem descanso. Core firme transfere energia para a cortada.", meta: "3 x 20 (Cada)" }
        ]
      },
      B: {
        titulo: "Treino B: Superiores & Cardio",
        subtitulo: "Foco em Ataque, Bloqueio e Queima de Gordura",
        exercicios: [
          { nome: "Puxador Alto Frente", tipo: "reps", tempo: 0, descanso: 60, obj: "Potência de Cortada", dica: "Polia alta, barra grande. Fortalece o grande dorsal para armar o golpe.", meta: "4 x 10-12" },
          { nome: "Supino Sentado", tipo: "reps", tempo: 0, descanso: 60, obj: "Força de Bloqueio/Ataque", dica: "Desenvolve peitoral e anterior de ombro para acelerar o braço na bola.", meta: "3 x 12" },
          { nome: "Desenvolvimento de Ombros", tipo: "reps", tempo: 0, descanso: 45, obj: "Suporte de Impacto", dica: "Pegadores horizontais. Protege o complexo do manguito rotador nos ataques.", meta: "3 x 10" },
          { nome: "Extensor de Braços (Tríceps)", tipo: "reps", tempo: 0, descanso: 45, obj: "Extensão de Toque/Ataque", dica: "Polia alta com barra pequena. Finalização potente do cotovelo.", meta: "3 x 12" },
          { nome: "Abdominal Lateral", tipo: "reps", tempo: 0, descanso: 45, obj: "Rotação de Tronco", dica: "Deslocamento lateral focado nos oblíquos. Essencial para o saque.", meta: "3 x 15 (Cada)" },
          { nome: "Cardio Aeróbico: Scaler", tipo: "tempo", tempo: 1200, descanso: 0, obj: "Queima de Gordura", dica: "Ritmo constante moderado a intenso. Monitore batimentos entre 65% e 75% da Fcmáx.", meta: "20 min" }
        ]
      }
    };

    let treinoAtual = 'A';
    let indexExercicioAtual = 0;
    
    // Variáveis de controle do Cronômetro
    let tempoRestante = 0;
    let timerInterval = null;
    let estáPausado = false;
    let modoDescanso = false;

    function renderizarLista() {
      const listaContainer = document.getElementById('lista-exercicios');
      const dados = rotinas[treinoAtual];
      
      document.getElementById('header-titulo').innerText = dados.titulo;
      document.getElementById('header-sub').innerHTML = `<i class="fa-regular fa-clock mr-1"></i> ${dados.subtitulo}`;
      
      listaContainer.innerHTML = '';
      dados.exercicios.forEach((ex, idx) => {
        let detalheTempo = ex.tipo === "tempo" ? `<span class="text-orange-400"><i class="fa-regular fa-clock"></i> Por Tempo</span>` : `Descanso: ${ex.descanso}s`;
        listaContainer.innerHTML += `
          <div class="bg-darkCard p-4 rounded-xl flex items-center gap-4 border border-gray-700">
            <div class="w-12 h-12 bg-gray-800 rounded-lg flex items-center justify-center text-xl font-bold text-primary">${idx + 1}</div>
            <div class="flex-1">
              <h3 class="font-bold text-gray-100 text-sm">${ex.nome}</h3>
              <p class="text-xs text-gray-400 mt-0.5">${ex.meta} • <span class="text-gray-500">${ex.obj}</span></p>
              <p class="text-[10px] text-primary mt-1 font-semibold uppercase tracking-wider">${detalheTempo}</p>
            </div>
          </div>
        `;
      });
    }

    function mudarTreino(tipo) {
      treinoAtual = tipo;
      document.getElementById('btn-treino-A').className = tipo === 'A' ? "flex-1 py-2 font-bold rounded-lg transition bg-primary text-white" : "flex-1 py-2 font-bold rounded-lg transition bg-gray-800 text-gray-400";
      document.getElementById('btn-treino-B').className = tipo === 'B' ? "flex-1 py-2 font-bold rounded-lg transition bg-primary text-white" : "flex-1 py-2 font-bold rounded-lg transition bg-gray-800 text-gray-400";
      renderizarLista();
    }

    function formatarTempo(segundos) {
      const mins = Math.floor(segundos / 60);
      const segs = segundos % 60;
      return `${mins.toString().padStart(2, '0')}:${segs.toString().padStart(2, '0')}`;
    }

    function gerenciarTimer() {
      clearInterval(timerInterval);
      if (tempoRestante <= 0) return;

      timerInterval = setInterval(() => {
        if (!estáPausado) {
          tempoRestante--;
          document.getElementById('timer-display').innerText = formatarTempo(tempoRestante);

          if (tempoRestante <= 0) {
            clearInterval(timerInterval);
            if (modoDescanso) {
              finalizarDescanso();
            } else {
              alert("Tempo do exercício concluído!");
              proximoExercicio();
            }
          }
        }
      }, 1000);
    }

    function atualizarTelaTreino() {
      const ex = rotinas[treinoAtual].exercicios[indexExercicioAtual];
      
      document.getElementById('treino-etapa').innerText = `Etapa ${indexExercicioAtual + 1}/${rotinas[treinoAtual].exercicios.length}`;
      document.getElementById('treino-nome-exercicio').innerText = ex.nome;
      document.getElementById('treino-meta').innerText = ex.meta;
      document.getElementById('treino-objetivo').innerText = ex.obj;
      document.getElementById('treino-dica').innerText = ex.dica;
      
      modoDescanso = false;
      estáPausado = false;
      document.getElementById('icone-play-pause').className = "fa-solid fa-pause";

      if (ex.tipo === "tempo") {
        document.getElementById('timer-estado').innerText = "Exercício em Andamento";
        document.getElementById('timer-estado').className = "text-xs font-bold uppercase tracking-widest text-orange-400";
        tempoRestante = ex.tempo;
        document.getElementById('btn-acao-principal').innerText = "Avançar Exercício";
        document.getElementById('btn-acao-principal').onclick = proximoExercicio;
        gerenciarTimer();
      } else {
        document.getElementById('timer-estado').innerText = "Pronto para a Série";
        document.getElementById('timer-estado').className = "text-xs font-bold uppercase tracking-widest text-green-400";
        document.getElementById('timer-display').innerText = "GO!";
        tempoRestante = 0;
        document.getElementById('btn-acao-principal').innerText = "Concluir Série";
        document.getElementById('btn-acao-principal').onclick = concluirSerie;
        clearInterval(timerInterval);
      }
    }

    function alternarPlayPause() {
      estáPausado = !estáPausado;
      document.getElementById('icone-play-pause').className = estáPausado ? "fa-solid fa-play ml-1" : "fa-solid fa-pause";
    }

    function concluirSerie() {
      const ex = rotinas[treinoAtual].exercicios[indexExercicioAtual];
      if (ex.descanso > 0) {
        modoDescanso = true;
        estáPausado = false;
        document.getElementById('timer-estado').innerText = "Descanso Ativo";
        document.getElementById('timer-estado').className = "text-xs font-bold uppercase tracking-widest text-blue-400";
        tempoRestante = ex.descanso;
        document.getElementById('timer-display').innerText = formatarTempo(tempoRestante);
        document.getElementById('btn-acao-principal').innerText = "Pular Descanso";
        document.getElementById('btn-acao-principal').onclick = finalizarDescanso;
        gerenciarTimer();
      } else {
        proximoExercicio();
      }
    }

    function finalizarDescanso() {
      clearInterval(timerInterval);
      atualizarTelaTreino();
    }

    function iniciarFluxoTreino() {
      indexExercicioAtual = 0;
      atualizarTelaTreino();
      document.getElementById('tela-hoje').classList.add('hidden');
      document.getElementById('tela-treino').classList.remove('hidden');
      document.getElementById('tela-treino').classList.add('flex');
    }

    function voltarParaHoje() {
      clearInterval(timerInterval);
      document.getElementById('tela-treino').classList.add('hidden');
      document.getElementById('tela-treino').classList.remove('flex');
      document.getElementById('tela-hoje').classList.remove('hidden');
    }

    function proximoExercicio() {
      const lista = rotinas[treinoAtual].exercicios;
      if (indexExercicioAtual < lista.length - 1) {
        indexExercicioAtual++;
        atualizarTelaTreino();
      } else {
        clearInterval(timerInterval);
        alert("Parabéns! Excelente treino de vôlei concluído!");
        voltarParaHoje();
      }
    }

    function exercicioAnterior() {
      if (indexExercicioAtual > 0) {
        indexExercicioAtual--;
        atualizarTelaTreino();
      }
    }

    renderizarLista();
  </script>
</body>
</html>
